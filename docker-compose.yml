version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql+asyncpg://ayush_user:ayush_pass@postgres:5432/ayush_db
      - REDIS_URL=redis://redis:6379/0
      - HF_TOKEN=${HF_TOKEN}
      - SECRET_KEY=generate_a_secure_random_key_here
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
      - /app/models

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=ayush_user
      - POSTGRES_PASSWORD=ayush_pass
      - POSTGRES_DB=ayush_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8080
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
